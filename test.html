<!DOCTYPE html>
<html>

<head>
    <title>FluencyFlow - Audio Diagnostic</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            margin: 5px;
            font-weight: bold;
        }

        #startBtn {
            background: #06b6d4;
            color: white;
        }

        #startBtn:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
        }

        #stopBtn {
            background: #f43f5e;
            color: white;
        }

        #stopBtn:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
        }

        #log {
            white-space: pre-wrap;
            font-size: 12px;
            line-height: 1.8;
            max-height: 500px;
            overflow-y: auto;
            background: #1e293b;
            padding: 16px;
            border-radius: 8px;
            margin-top: 16px;
            border: 1px solid #334155;
        }

        .ok {
            color: #4ade80;
        }

        .err {
            color: #fb7185;
        }

        .info {
            color: #38bdf8;
        }

        .warn {
            color: #fbbf24;
        }

        h1 {
            color: #06b6d4;
            margin-bottom: 8px;
            font-size: 24px;
        }

        p {
            color: #94a3b8;
            margin-bottom: 16px;
            font-size: 14px;
        }

        #status {
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
            margin: 10px 0;
            font-size: 14px;
        }

        .counters {
            display: flex;
            gap: 12px;
            margin: 12px 0;
            flex-wrap: wrap;
        }

        .counter {
            background: #1e293b;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid #334155;
        }

        .counter span {
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎤 FluencyFlow Audio Diagnostic</h1>
        <p>Tests the Gemini Live API directly in the browser. Click Start, allow mic, then speak.</p>
        <div>
            <button id="startBtn">▶ Start Test</button>
            <button id="stopBtn" disabled>■ Stop</button>
        </div>
        <div id="status" style="background: #334155">IDLE</div>
        <div class="counters">
            <div class="counter">📩 Msgs: <span id="msgCount">0</span></div>
            <div class="counter">🔊 Audio: <span id="audioCount">0</span></div>
            <div class="counter">📝 Text: <span id="transCount">0</span></div>
            <div class="counter">📤 Sent: <span id="sentCount">0</span></div>
        </div>
        <div id="log"></div>
    </div>
    <script type="module" src="/test-audio.ts"></script>
</body>

</html>
